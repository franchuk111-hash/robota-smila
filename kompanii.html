<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">

<link rel="canonical" href="https://robota-smila.com.ua/kompanii/">
<link rel="alternate" hreflang="uk-UA" href="https://robota-smila.com.ua/kompanii/">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header class="site"><div class="container nav">
  <a href="index.html" class="logo"><span class="mark"><i></i><i></i><i></i><i></i></span> robota-<b>smila</b></a>
  <div class="toggle">
    <a href="index.html" class="active">Шукачам</a>
    <a href="rabotodatelyam.html">Роботодавцям</a>
  </div>
  <div class="search"><input type="text" placeholder="Пошук: продавець, водій, без досвіду…"></div>
  <nav class="nav-links">
    <a href="vakansii.html">Вакансії</a>
    <a href="kompanii.html">Компанії</a>
    <a href="blog.html">Блог</a>
  </nav>

  <button class="burger" aria-label="Меню">☰</button>
</div></header>

<div class="container">
  <nav class="crumbs"><a href="index.html">Головна</a> › Компанії</nav>
  <h1 style="font-size:38px;font-weight:800;color:var(--ink2);margin:0 0 8px">Компанії Сміли</h1>
  <p class="sub">Роботодавці міста та їхні актуальні вакансії</p>
  <div class="grid3" id="companies"></div>
</div>

<footer class="site"><div class="container">
  <div class="fbottom">© 2026 robota-smila.com.ua — Робота у Смілі. Всі права захищені.</div>
</div></footer>

<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script>
document.getElementById('companies').innerHTML = COMPANIES.map(c=>{
  const n = VACANCIES.filter(v=>v.company===c.name).length;
  return `<article class="vac">
    <div class="company" style="font-size:19px;margin-bottom:10px"><span class="co-ico" style="width:40px;height:40px;font-size:22px;display:flex;align-items:center;justify-content:center;background:var(--soft)">${c.ico}</span><a href="kompaniya.html?slug=${c.slug}" style="color:var(--ink2)">${c.name}</a></div>
    <div class="locs">${c.industry}<span class="dot">·</span>Сміла, ${c.district}</div>
    <p style="color:var(--muted);margin:12px 0 16px">${c.about}</p>
    <a href="kompaniya.html?slug=${c.slug}" class="btn ghost">${n} ${n===1?'вакансія':'вакансій'} →</a>
  </article>`;
}).join('');
</script>
</body>
</html>
